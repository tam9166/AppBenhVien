spring.application.name=medical-inventory-management
server.port=8080
spring.profiles.active=${APP_PROFILE:local}

# Ep UTF-8 cho request/response
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Cau hinh JPA chung
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.open-in-view=true

# Cau hinh upload/view
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Base URL dung de sinh QR truy cap thong tin vat tu
app.base-url=${APP_BASE_URL:http://localhost:8080}

# Hien thi loi than thien
server.error.include-message=always
server.error.whitelabel.enabled=false

# Chatbot assistant
# Mac dinh chay bang rule-based NLP de demo on dinh.
# Bat Gemini khi co API key hop le:
# app.assistant.gemini.enabled=true
# app.assistant.gemini.api-key=${GEMINI_API_KEY}
app.assistant.gemini.enabled=${GEMINI_ENABLED:false}
app.assistant.gemini.api-key=${GEMINI_API_KEY:}
app.assistant.gemini.model=${GEMINI_MODEL:gemini-2.0-flash}
app.assistant.gemini.endpoint=${GEMINI_ENDPOINT:https://generativelanguage.googleapis.com/v1beta}
app.assistant.openai.enabled=${OPENAI_ENABLED:false}
app.assistant.openai.api-key=${OPENAI_API_KEY:}
app.assistant.openai.model=${OPENAI_MODEL:gpt-4o-mini}
app.assistant.openai.endpoint=${OPENAI_ENDPOINT:https://api.openai.com/v1/chat/completions}
app.assistant.facebook.enabled=${FACEBOOK_ASSISTANT_ENABLED:false}
app.assistant.facebook.verify-token=${FACEBOOK_VERIFY_TOKEN:}
