<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Gói tầm soát ung thư')}"></head>
<body class="home-page">
<div class="container py-4 py-lg-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">Gói tầm soát ung thư</h1>
        <a class="btn btn-outline-secondary" th:href="@{/patient}">Cổng bệnh nhân</a>
    </div>
    <div class="row g-4">
        <div class="col-md-6 col-xl-4" th:each="pkg : ${packages}">
            <div class="card card-panel h-100">
                <div class="card-body">
                    <span class="badge text-bg-light text-primary mb-2" th:text="${pkg.code}">GOI</span>
                    <h5 th:text="${pkg.name}">Gói tầm soát</h5>
                    <p class="text-muted" th:text="${pkg.targetGroup}">Đối tượng</p>
                    <p class="small" th:text="${pkg.includedServices}">Dịch vụ</p>
                    <h4 class="text-primary" th:text="${#numbers.formatDecimal(pkg.price,0,'COMMA',0,'POINT') + ' đ'}">0 đ</h4>
                    <a class="btn btn-medical w-100 mt-2" th:href="@{/patient/appointments/new}">Đăng ký tư vấn</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
