<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Lỗi hệ thống')}"></head>
<body class="qr-info-page">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card card-panel">
                <div class="card-body p-5 text-center">
                    <div class="display-5 text-danger mb-3"><i class="bi bi-exclamation-octagon"></i></div>
                    <h3 th:text="${errorTitle}">Lỗi</h3>
                    <p class="text-muted" th:text="${errorMessage}">Thông báo lỗi</p>
                    <p class="small text-secondary mb-4">Đường dẫn: <span th:text="${requestUri}"></span></p>
                    <a th:href="@{/dashboard}" class="btn btn-medical">Quay về dashboard</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
