<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Quản lý xuất kho')}"></head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/layout :: sidebar('outbound')}"></aside>
    <main class="main-content">
        <header th:replace="~{fragments/layout :: topbar('Quản lý xuất kho')}"></header>
        <section class="content-area">
            <div class="row g-4">
                <div class="col-xl-5">
                    <div class="card card-panel">
                        <div class="card-body">
                            <h5 class="card-title mb-3">Tạo phiếu xuất</h5>
                            <div th:if="${param.success}" class="alert alert-success">Tạo phiếu xuất thành công.</div>
                            <form th:action="@{/outbound/receipts}" th:object="${receiptForm}" method="post">
                                <div th:if="${#fields.hasAnyErrors()}" class="alert alert-danger">
                                    <div th:each="error : ${#fields.errors('*')}" th:text="${error}"></div>
                                </div>
                                <div class="row g-3">
                                    <div class="col-md-6"><label class="form-label">Mã phiếu xuất</label><input class="form-control" th:field="*{receiptCode}"></div>
                                    <div class="col-md-6"><label class="form-label">Ngày xuất</label><input type="date" class="form-control" th:field="*{receiptDate}"></div>
                                    <div class="col-6"><label class="form-label">Người xuất</label><input class="form-control" th:field="*{createdBy}"></div>
                                    <div class="col-6"><label class="form-label">Khoa nhận</label><input class="form-control" th:field="*{departmentName}" placeholder="Ví dụ: Khoa cấp cứu"></div>
                                    <div class="col-12"><label class="form-label">Ghi chú</label><textarea class="form-control" th:field="*{note}" rows="2"></textarea></div>
                                </div>
                                <hr>
                                <div class="receipt-detail-list" data-collection="outbound">
                                    <div class="detail-row" th:each="detail, stat : *{details}">
                                        <div class="row g-2 align-items-end mb-2">
                                            <div class="col-6">
                                                <label class="form-label">Vật tư</label>
                                                <select class="form-select" th:field="*{details[__${stat.index}__].medicalSupplyId}">
                                                    <option value="">-- Chọn vật tư --</option>
                                                    <option th:each="supply : ${supplies}" th:value="${supply.id}" th:text="${supply.name + ' - Tồn: ' + supply.quantity}"></option>
                                                </select>
                                            </div>
                                            <div class="col-3"><label class="form-label">Số lượng</label><input type="number" class="form-control" th:field="*{details[__${stat.index}__].quantity}"></div>
                                            <div class="col-3"><label class="form-label">Đơn giá</label><input type="number" step="0.01" class="form-control" th:field="*{details[__${stat.index}__].unitPrice}"></div>
                                        </div>
                                    </div>
                                </div>
                                <button class="btn btn-outline-primary w-100 mb-3" type="button" onclick="addReceiptRow('outbound')">Thêm dòng vật tư</button>
                                <button class="btn btn-medical w-100" type="submit">Lưu phiếu xuất</button>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="col-xl-7">
                    <div class="card card-panel">
                        <div class="card-body">
                            <h5 class="card-title mb-3">Lịch sử phiếu xuất</h5>
                            <div class="table-responsive">
                                <table class="table table-modern">
                                    <thead>
                                    <tr><th>Mã phiếu</th><th>Ngày xuất</th><th>Khoa nhận</th><th>Tổng tiền</th><th>Chi tiết lô cấp</th></tr>
                                    </thead>
                                    <tbody>
                                    <tr th:each="receipt : ${receipts}">
                                        <td th:text="${receipt.receiptCode}"></td>
                                        <td th:text="${receipt.receiptDate}"></td>
                                        <td th:text="${receipt.departmentName}"></td>
                                        <td th:text="${#numbers.formatDecimal(receipt.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                                        <td><div class="small" th:each="detail : ${receipt.details}" th:text="${detail.medicalSupply.name + ' x ' + detail.quantity + ' | Lô cấp: ' + detail.allocatedBatches}"></div></td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(receipts)}"><td colspan="5" class="text-center text-muted py-4">Chưa có phiếu xuất nào.</td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
